# SkyFi Remote MCP Server — dev/demo
# Optional: use for consistent env and one-command run.

services:
  mcp-server:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Mount source for quick iteration (rebuild to pick up changes)
      - .:/app
      # Optional: mount host folder so download_recent_orders / download_order_file save to your machine.
      # Uncomment and set SKYFI_DOWNLOAD_DIR=/downloads in .env so MCP download tools write here.
      # - ~/Downloads:/downloads
    command: ["python", "-m", "src.server"]
